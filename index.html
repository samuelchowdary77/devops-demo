<!DOCTYPE html>
<html>
<head>
    <title>CI/CD Pipeline Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
        }

        h1 {
            background: #0078d4;
            color: white;
            padding: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 15px;
            width: 200px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .status-success {
            color: green;
            font-weight: bold;
        }

        .status-running {
            color: orange;
            font-weight: bold;
        }

        .status-failed {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>Azure DevOps CI/CD Dashboard</h1>

<div class="container">

    <div class="card">
        <h3>Code Commit</h3>
        <p class="status-success">Success</p>
    </div>

    <div class="card">
        <h3>Build</h3>
        <p class="status-running">Running</p>
    </div>

    <div class="card">
        <h3>Test</h3>
        <p class="status-success">Passed</p>
    </div>

    <div class="card">
        <h3>Deploy</h3>
        <p class="status-success">Deployed</p>
    </div>

</div>

</body>
</html>
